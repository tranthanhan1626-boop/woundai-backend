services:
  - type: web
    name: woundai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python3 train_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
